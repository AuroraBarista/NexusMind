<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="style.css">
    <script src="popup.js" defer></script>
</head>

<body>
    <div class="container">
        <div class="header">
            <span class="logo">NEXUS<span class="bold">MIND</span></span>
            <span class="status">UPLINK READY</span>
        </div>

        <div class="actions">
            <button id="capture-page" class="btn">
                <span class="icon">📄</span>
                CAPTURE PAGE
            </button>
            <button id="capture-selection" class="btn">
                <span class="icon">✂️</span>
                CAPTURE SELECTION
            </button>
        </div>

        <!-- Destination Selection -->
        <label
            style="display: block; font-size: 10px; color: var(--text-secondary); margin-top: 15px; margin-bottom: 5px; font-weight: 600; text-transform: uppercase;">Destination</label>
        <select id="destinationSelect"
            style="width: 100%; padding: 10px; margin-bottom: 10px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: white; font-size: 12px; outline: none; cursor: pointer;">
            <option value="global" style="background:#030014">🌍 Global Capture (Inbox)</option>
            <option value="project" style="background:#030014">🎯 Directly to Project (Evidence)</option>
        </select>

        <!-- Project Selection -->
        <div id="projectWrapper" style="display: none;">
            <label
                style="display: block; font-size: 10px; color: var(--text-secondary); margin-bottom: 5px; font-weight: 600; text-transform: uppercase;">Select
                Project</label>
            <select id="projectSelect"
                style="width: 100%; padding: 10px; margin-bottom: 10px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: white; font-size: 12px; outline: none; cursor: pointer;">
                <option value="" style="background:#030014">Loading...</option>
            </select>
        </div>

        <textarea id="note-input" placeholder="Add context or quick thought..."></textarea>

        <button id="send-btn" class="send-btn">TRANSMIT TO TERMINAL</button>

        <div id="status-msg" class="hidden"></div>
    </div>
</body>

</html>
